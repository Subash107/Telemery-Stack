global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: bbp-final-pro-framework
    stack: observability

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093

  - job_name: blackbox-exporter
    static_configs:
      - targets:
          - blackbox-exporter:9115

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          host: kali-vm
    relabel_configs:
      - source_labels:
          - host
        target_label: instance

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          host: kali-vm
    relabel_configs:
      - source_labels:
          - host
        target_label: instance

  - job_name: service-probes
    metrics_path: /probe
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/service-probes.yml
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target
      - source_labels:
          - module
        target_label: __param_module
      - source_labels:
          - __param_target
        target_label: probed_target
      - source_labels:
          - __param_target
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
