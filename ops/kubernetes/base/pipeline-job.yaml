apiVersion: batch/v1
kind: Job
metadata:
  name: bbp-pipeline-simulation
  labels:
    app.kubernetes.io/name: bbp-pipeline
    app.kubernetes.io/part-of: bbp-final-pro-framework
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bbp-pipeline
        app.kubernetes.io/part-of: bbp-final-pro-framework
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-mock-api
          image: bbp_final_pro_framework-pipeline:latest
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - -lc
            - |
              until curl -fsS http://bbp-mock-api:18080/mock-six-api/health > /dev/null; do
                echo "Waiting for bbp-mock-api..."
                sleep 2
              done
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      containers:
        - name: pipeline
          image: bbp_final_pro_framework-pipeline:latest
          imagePullPolicy: IfNotPresent
          command:
            - bash
            - scripts/run.sh
          envFrom:
            - configMapRef:
                name: bbp-pipeline-config
            - secretRef:
                name: bbp-mock-api-credentials
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: pipeline-database
              mountPath: /workspace/database
            - name: pipeline-results
              mountPath: /workspace/results
            - name: pipeline-artifacts
              mountPath: /workspace/artifacts
      volumes:
        - name: pipeline-database
          emptyDir: {}
        - name: pipeline-results
          emptyDir: {}
        - name: pipeline-artifacts
          emptyDir: {}
